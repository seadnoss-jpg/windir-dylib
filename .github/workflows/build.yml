name: Build WINDIR Keygate dylib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install ldid dpkg make

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-macos-ldid-v2

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown -R "$(whoami)" /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          mkdir -p /opt/theos/sdks
          curl -fsSL "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/

      - name: Build
        run: |
          set -e
          export THEOS=/opt/theos
          export PATH="$THEOS/bin:$(brew --prefix make)/libexec/gnubin:$PATH"
          make package FINALPACKAGE=1
          echo "--- Build done ---"
          find .theos -name "*.dylib" 2>/dev/null || true
          ls packages/ 2>/dev/null || true

      - name: Collect artifacts
        id: collect
        run: |
          DYLIB=$(find .theos -name "*.dylib" 2>/dev/null | grep -v '\.unsigned' | head -1)
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)
          echo "dylib=$DYLIB" >> $GITHUB_OUTPUT
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "dylib: $DYLIB | deb: $DEB"

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: WindirKeygate-dylib
          path: ${{ steps.collect.outputs.dylib }}
          if-no-files-found: warn

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: WindirKeygate-deb
          path: ${{ steps.collect.outputs.deb }}
          if-no-files-found: warn

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "WINDIR MODE v1.0.${{ github.run_number }}"
          body: |
            ## WINDIR MODE Keygate

            Inject `.dylib` into any `.ipa` using Sideloadly, TrollStore, or esign.

            **Dashboard:** https://web-dynamic-library--karrderriim.replit.app
            **Login:** `Windir@gmail.com` / `WINDIR`

            ### How the popup looks
            - Title: **WINDIR MODE**
            - Enter your key → Activate / Quit
            - Shows package type + time remaining after activation
          files: |
            ${{ steps.collect.outputs.dylib }}
            ${{ steps.collect.outputs.deb }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
