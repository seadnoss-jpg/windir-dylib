name: Build WINDIR Keygate dylib

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Theos
        id: theos-cache
        uses: actions/cache@v4
        with:
          path: /opt/theos
          key: theos-macos-v5

      - name: Install Theos (fresh)
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown -R "$(whoami)" /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "Theos cloned. Downloading SDK..."
          mkdir -p /opt/theos/sdks
          curl -fsSL "https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz" \
            -o /tmp/sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C /opt/theos/sdks/
          echo "SDK installed."

      - name: Build
        run: |
          set -e
          export THEOS=/opt/theos
          export PATH="$THEOS/bin:$PATH"
          make package FINALPACKAGE=1
          echo "Build complete."
          find . -name "*.dylib" 2>/dev/null
          find packages -name "*.deb" 2>/dev/null

      - name: Collect artifacts
        id: collect
        run: |
          DYLIB=$(find .theos -name "*.dylib" 2>/dev/null | grep -v debug | head -1)
          [ -z "$DYLIB" ] && DYLIB=$(find . -path "*/obj/*" -name "*.dylib" 2>/dev/null | head -1)
          DEB=$(ls packages/*.deb 2>/dev/null | head -1)
          echo "dylib=$DYLIB" >> $GITHUB_OUTPUT
          echo "deb=$DEB" >> $GITHUB_OUTPUT
          echo "dylib path: $DYLIB"
          echo "deb path: $DEB"

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: WindirKeygate-dylib
          path: ${{ steps.collect.outputs.dylib }}
          if-no-files-found: warn

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: WindirKeygate-deb
          path: ${{ steps.collect.outputs.deb }}
          if-no-files-found: warn

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "WINDIR MODE v1.0.${{ github.run_number }}"
          body: |
            ## WINDIR MODE Keygate

            Inject `.dylib` into any `.ipa` using Sideloadly, TrollStore, or esign.

            **Dashboard:** https://web-dynamic-library--karrderriim.replit.app
            **Login:** `Windir@gmail.com` / `WINDIR`
          files: |
            ${{ steps.collect.outputs.dylib }}
            ${{ steps.collect.outputs.deb }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
